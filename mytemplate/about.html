<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .error-container {
            text-align: center;
        }

        .error-code {
            font-size: 6rem;
            color: #e74c3c;
        }

        .error-message {
            font-size: 1.5rem;
            color: #333;
        }

        .error-link {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 4rem;
            }

            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Oops! Page not found.</div>
        <p>The page is in construction.</p>
        <p><a href="/" class="error-link">Go back to the home page</a></p>
    </div>
</body>
</html>
